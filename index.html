<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>海底世界探索 - 3D 海洋体验</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body, #root {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    canvas {
      display: block;
    }
    .hud-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      color: #7fdbff;
      font-size: 14px;
      line-height: 1.8;
      background: rgba(0, 20, 40, 0.65);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(127, 219, 255, 0.25);
      border-radius: 12px;
      padding: 16px 20px;
      min-width: 220px;
      pointer-events: none;
      user-select: none;
    }
    .hud-panel .hud-title {
      font-size: 13px;
      color: rgba(127, 219, 255, 0.6);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .hud-panel .depth-value {
      font-size: 36px;
      font-weight: 700;
      color: #00e5ff;
      text-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
      line-height: 1.2;
    }
    .hud-panel .coord-label {
      color: rgba(127, 219, 255, 0.5);
      font-size: 11px;
      margin-top: 6px;
    }
    .hud-panel .coord-value {
      font-family: 'Courier New', monospace;
      color: rgba(127, 219, 255, 0.8);
      font-size: 12px;
    }
    .controls-hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      color: rgba(127, 219, 255, 0.6);
      font-size: 12px;
      text-align: center;
      background: rgba(0, 20, 40, 0.5);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(127, 219, 255, 0.15);
      border-radius: 10px;
      padding: 10px 24px;
      pointer-events: none;
      user-select: none;
      transition: opacity 0.5s ease;
    }
    .controls-hint span {
      color: #7fdbff;
      font-weight: 600;
    }
    .cruise-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      color: #7fdbff;
      font-size: 14px;
      background: rgba(0, 20, 40, 0.65);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(127, 219, 255, 0.25);
      border-radius: 10px;
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      user-select: none;
    }
    .cruise-btn:hover {
      background: rgba(0, 60, 100, 0.7);
      border-color: rgba(127, 219, 255, 0.5);
      color: #00e5ff;
    }
    .cruise-btn.active {
      background: rgba(0, 100, 180, 0.5);
      border-color: #00e5ff;
      color: #00e5ff;
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
    }
    .info-card-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .info-card {
      pointer-events: auto;
      background: rgba(0, 15, 35, 0.9);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(127, 219, 255, 0.3);
      border-radius: 16px;
      padding: 28px 32px;
      max-width: 380px;
      width: 90%;
      color: #e0f7fa;
      animation: cardIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 0 40px rgba(0, 229, 255, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.9) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .info-card .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .info-card .card-name {
      font-size: 22px;
      font-weight: 700;
      color: #00e5ff;
      text-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
    }
    .info-card .card-close {
      width: 28px;
      height: 28px;
      border: 1px solid rgba(127, 219, 255, 0.3);
      border-radius: 50%;
      background: rgba(0, 40, 80, 0.5);
      color: #7fdbff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.2s;
    }
    .info-card .card-close:hover {
      background: rgba(255, 50, 50, 0.3);
      border-color: rgba(255, 100, 100, 0.5);
      color: #ff6b6b;
    }
    .info-card .card-body {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .info-card .card-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .info-card .card-label {
      min-width: 72px;
      font-size: 12px;
      color: rgba(127, 219, 255, 0.6);
      padding-top: 2px;
      flex-shrink: 0;
    }
    .info-card .card-value {
      font-size: 14px;
      color: #e0f7fa;
      line-height: 1.6;
    }
    .info-card .card-tag {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .tag-safe {
      background: rgba(0, 200, 100, 0.2);
      color: #69f0ae;
      border: 1px solid rgba(0, 200, 100, 0.3);
    }
    .tag-vulnerable {
      background: rgba(255, 200, 0, 0.2);
      color: #ffd740;
      border: 1px solid rgba(255, 200, 0, 0.3);
    }
    .tag-endangered {
      background: rgba(255, 80, 80, 0.2);
      color: #ff8a80;
      border: 1px solid rgba(255, 80, 80, 0.3);
    }
    .tag-critical {
      background: rgba(200, 0, 0, 0.3);
      color: #ff5252;
      border: 1px solid rgba(255, 50, 50, 0.4);
    }
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #001020 0%, #002040 50%, #000a1a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 1s ease;
    }
    .loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading-title {
      font-size: 36px;
      font-weight: 700;
      color: #00e5ff;
      text-shadow: 0 0 30px rgba(0, 229, 255, 0.4);
      margin-bottom: 12px;
      letter-spacing: 4px;
    }
    .loading-sub {
      font-size: 14px;
      color: rgba(127, 219, 255, 0.5);
      letter-spacing: 6px;
      margin-bottom: 40px;
    }
    .loading-bar-outer {
      width: 240px;
      height: 3px;
      background: rgba(127, 219, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .loading-bar-inner {
      height: 100%;
      background: linear-gradient(90deg, #00e5ff, #7fdbff);
      border-radius: 2px;
      animation: loadProgress 2s ease-in-out forwards;
    }
    @keyframes loadProgress {
      from { width: 0%; }
      to { width: 100%; }
    }
    .bubble-particle {
      position: fixed;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(127, 219, 255, 0.15);
      border: 1px solid rgba(127, 219, 255, 0.1);
      pointer-events: none;
      z-index: 50;
      animation: bubbleFloat linear infinite;
    }
    @keyframes bubbleFloat {
      0% { transform: translateY(0) scale(1); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100vh) scale(0.3); opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
